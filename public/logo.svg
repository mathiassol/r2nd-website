  <rect x="176" y="80" width="160" height="84" rx="14" fill="#d04841" opacity="0.3"/>
  <!-- Third layer -->
  <rect x="126" y="180" width="260" height="84" rx="14" fill="#d04841" opacity="0.5"/>
  <!-- Second layer -->
  <rect x="76" y="280" width="360" height="84" rx="14" fill="#d04841" opacity="0.75"/>
  <!-- Bottom layer (foundation) -->
  <rect x="36" y="380" width="440" height="84" rx="14" fill="#d04841"/>
</svg>
